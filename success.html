<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>感謝您的詢問 | 維新鋁業</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a3a5c; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Noto Sans TC', sans-serif; }
    .card { background: #fff; border-radius: 16px; padding: 3rem 2.5rem; text-align: center; max-width: 480px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
    .icon { font-size: 4rem; color: #e8a020; margin-bottom: 1rem; }
    h1 { color: #1a3a5c; font-size: 1.6rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #555; line-height: 1.8; }
    .btn-back { background: #e8a020; color: #fff; border: none; padding: 0.75rem 2rem; border-radius: 6px; font-weight: 700; text-decoration: none; display: inline-block; margin-top: 1.5rem; }
    .btn-back:hover { background: #cf8e1a; color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>感謝您的詢問！<br>Thank you for your inquiry!</h1>
    <p>我們已收到您的詢價單，業務團隊將於 1–2 個工作天內與您聯繫。<br><br>
    We have received your inquiry and our sales team will contact you within 1–2 business days.</p>
    <a href="/" class="btn-back">← 回到首頁 / Back to Home</a>
  </div>
</body>
</html>
